name: Android APK Build (Experimental)

on:
  workflow_dispatch:

jobs:
  build_apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Sync Capacitor
        working-directory: ./frontend
        run: npx cap sync android

      - name: Copy Backend Source
        run: |
          mkdir -p frontend/android/app/src/main/python
          cp -r backend/app frontend/android/app/src/main/python/
          cp -r backend/alembic frontend/android/app/src/main/python/
          cp backend/alembic.ini frontend/android/app/src/main/python/

      - name: Build APK with Gradle
        working-directory: ./frontend/android
        run: |
          chmod +x gradlew
          # Chaquopy needs to know which python binary to use (the one from setup-python)
          PYTHON_PATH=$(which python)
          ./gradlew assembleDebug -PbuildPython="$PYTHON_PATH"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

name: Android APK Build (Experimental)

on:
  workflow_dispatch:

jobs:
  build_apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Rust (needed for pydantic-core compilation)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Sync Capacitor
        working-directory: ./frontend
        run: npx cap sync android

      - name: Copy Backend Source
        run: |
          mkdir -p frontend/android/app/src/main/python
          cp -r backend/app frontend/android/app/src/main/python/
          cp -r backend/alembic frontend/android/app/src/main/python/
          cp backend/alembic.ini frontend/android/app/src/main/python/

      - name: Generate App Icons
        run: |
          pip install pillow -q
          python3 -c "
          from PIL import Image
          import os
          src = 'frontend/public/ArthSaarthi.png'
          img = Image.open(src).convert('RGBA')
          sizes = {'mdpi': 48, 'hdpi': 72, 'xhdpi': 96, 'xxhdpi': 144, 'xxxhdpi': 192}
          for dns, sz in sizes.items():
              dest = f'frontend/android/app/src/main/res/mipmap-{dns}'
              os.makedirs(dest, exist_ok=True)
              resized = img.resize((sz, sz), Image.Resampling.LANCZOS)
              resized.save(f'{dest}/ic_launcher.png')
              resized.save(f'{dest}/ic_launcher_round.png')
          "

      - name: Build APK with Gradle
        working-directory: ./frontend/android
        run: |
          chmod +x gradlew
          PYTHON_PATH=$(which python)
          ./gradlew assembleDebug -PbuildPython="$PYTHON_PATH" --no-parallel

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: frontend/android/app/build/outputs/apk/debug/ArthSaarti-debug.apk
